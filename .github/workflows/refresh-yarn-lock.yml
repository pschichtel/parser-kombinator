name: Refresh kotlin-js yarn.lock

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6

      - name: Remove existing yarn.lock
        run: |
          rm -f kotlin-js-store/yarn.lock

      - name: Assemble project (regenerate yarn.lock)
        run: |
          ./gradlew --configuration-cache :kotlinStoreYarnLock

      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Workflow"
          git config user.email "kognigy@pschichtel.github.io"
          git add kotlin-js-store/yarn.lock
          if git commit -m "Refresh yarn.lock"
          then
            git push origin HEAD:main
          fi
