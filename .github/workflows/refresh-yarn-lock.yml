name: Refresh kotlin-js yarn.lock

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Remove existing yarn.lock
        run: |
          rm -f kotlin-js-store/yarn.lock

      - name: Assemble project (regenerate yarn.lock)
        run: |
          ./gradlew --configuration-cache :kotlinStoreYarnLock

      - name: Commit and push changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Workflow"
          git config user.email "kognigy@pschichtel.github.io"
          git add kotlin-js-store/yarn.lock
          if git commit -m "Refresh yarn.lock"
          then
            git push origin HEAD:main
          fi
